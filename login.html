<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In to Oncloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body class="auth-page">

    <div class="auth-container">
        <h2>Sign In to Oncloud</h2>

        <div class="oauth-grid">
            <button type="button" class="oauth-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#24292e" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                GitHub
            </button>
            
            <button type="button" class="oauth-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M23.955 13.587l-1.342-4.135-2.664-8.189a.455.455 0 0 0-.867 0L16.418 9.45H7.582L4.918 1.263a.455.455 0 0 0-.867 0L1.386 9.45.044 13.587a.924.924 0 0 0 .331 1.023L12 23.054l11.625-8.443a.924.924 0 0 0 .33-1.024z" fill="#fc6d26"/>
                </svg>
                GitLab
            </button>
            
            <button type="button" class="oauth-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M.778 1.213a.768.768 0 0 0-.768.892l3.263 19.81c.084.5.515.868 1.022.873H19.95a.772.772 0 0 0 .77-.646l3.27-20.03a.768.768 0 0 0-.768-.891L.778 1.213zM14.52 15.53H9.522L8.17 8.466h7.561l-1.211 7.064z" fill="#0052cc"/>
                </svg>
                Bitbucket
            </button>
            
            <button type="button" class="oauth-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>
        </div>

        <div class="auth-divider">or</div>

        <div id="error-message-box" class="auth-error-box" style="display: none;"></div>

        <form class="auth-form" id="loginForm">
            <label for="email">Email</label>
            <input type="text" id="email" placeholder="your@email.com">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min. 6 characters">
            <button type="submit" class="submit-auth-btn" id="authSubmitBtn">Sign in</button>
        </form>

        <div class="auth-footer-links">
            <p><a href="#" id="ssoLink">Sign in with SSO</a></p>
            <p>Need an account? <a href="#" id="toggleAuthMode">Sign up</a></p>
            <p>Forgot your password? <a href="#" id="resetPasswordLink">Reset it</a></p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyi3ioxk8rhvtadngX8cXgCDMkWB3BClY",
            authDomain: "oncloud-f6f30.firebaseapp.com",
            projectId: "oncloud-f6f30",
            storageBucket: "oncloud-f6f30.firebasestorage.app",
            messagingSenderId: "1051051244925",
            appId: "1:1051051244925:web:45f70f5f7272bf54a56014"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) window.location.href = "dashboard.html";
        });

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorBox = document.getElementById('error-message-box');
        const ssoLink = document.getElementById('ssoLink');
        let isSignUpMode = false;

        const authSubmitBtn = document.getElementById('authSubmitBtn');
        const toggleAuthMode = document.getElementById('toggleAuthMode');
        const resetPasswordLink = document.getElementById('resetPasswordLink');

        toggleAuthMode.addEventListener('click', (e) => {
            e.preventDefault();
            isSignUpMode = !isSignUpMode;
            errorBox.style.display = 'none';
            passwordInput.value = '';
            if (isSignUpMode) {
                document.querySelector('.auth-container h2').textContent = 'Create your Oncloud account';
                authSubmitBtn.textContent = 'Sign up';
                toggleAuthMode.textContent = 'Sign in instead';
            } else {
                document.querySelector('.auth-container h2').textContent = 'Sign In to Oncloud';
                authSubmitBtn.textContent = 'Sign in';
                toggleAuthMode.textContent = 'Sign up';
            }
        });

        resetPasswordLink.addEventListener('click', async (e) => {
            e.preventDefault();
            const emailValue = emailInput.value.trim();
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(emailValue)) {
                showError("Enter your email address above first, then click Reset it.");
                return;
            }
            try {
                await auth.sendPasswordResetEmail(emailValue);
                showSuccess(`Password reset email sent to ${emailValue}. Check your inbox.`);
            } catch (err) {
                if (err.code === 'auth/user-not-found') {
                    showError("No account found with that email address.");
                } else {
                    showError(err.message);
                }
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const emailValue = emailInput.value.trim();
            const passwordValue = passwordInput.value.trim();
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            errorBox.style.display = 'none';

            if (!emailPattern.test(emailValue)) {
                showError("Please enter a valid email address (e.g., name@domain.com).");
                return;
            }
            if (passwordValue.length < 6) {
                showError("Password must be at least 6 characters long.");
                return;
            }

            authSubmitBtn.disabled = true;
            authSubmitBtn.textContent = isSignUpMode ? 'Creating account...' : 'Signing in...';

            try {
                if (isSignUpMode) {
                    await auth.createUserWithEmailAndPassword(emailValue, passwordValue);
                } else {
                    await auth.signInWithEmailAndPassword(emailValue, passwordValue);
                }
            } catch (err) {
                authSubmitBtn.disabled = false;
                authSubmitBtn.textContent = isSignUpMode ? 'Sign up' : 'Sign in';
                passwordInput.value = '';
                passwordInput.focus();

                if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
                    showError("Incorrect password. Please try again.");
                } else if (err.code === 'auth/user-not-found') {
                    showError("No account found with that email. Click \"Sign up\" to create one.");
                } else if (err.code === 'auth/email-already-in-use') {
                    showError("An account with that email already exists. Sign in instead.");
                } else if (err.code === 'auth/too-many-requests') {
                    showError("Too many failed attempts. Account temporarily locked reset your password or try later.");
                } else if (err.code === 'auth/invalid-email') {
                    showError("That email address doesn't look right. Please check and try again.");
                } else {
                    showError(err.message);
                }
            }
        });

        document.querySelectorAll('.oauth-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const text = btn.textContent.trim();

                
                if (text === 'GitHub') {
                    window.location.href = '/api/auth/github';
                    return;
                }

                
                if (text === 'Google') {
                    try {
                        const provider = new firebase.auth.GoogleAuthProvider();
                        await auth.signInWithPopup(provider);
                    } catch (err) {
                        if (err.code === 'auth/popup-closed-by-user') {
                            showError("Sign-in popup was closed. Please try again.");
                        } else {
                            showError(err.message);
                        }
                    }
                    return;
                }

                
                const repoUrl = 'https://github.com/fadethedev99/OnCloud';
                const confirmed = confirm(`${text} sign-in isn't connected yet.\n\nWant to add it? You can set it up in the repo:\n${repoUrl}\n\nClick OK to open the repo.`);
                if (confirmed) window.open(repoUrl, '_blank');
            });
        });

        ssoLink.addEventListener('click', (e) => {
            e.preventDefault();
            const repoUrl = 'https://github.com/fadethedev99/OnCloud';
            const domain = prompt("Enter your corporate email domain (e.g., company.com):");
            if (domain && domain.trim() !== "") {
                const confirmed = confirm(`SSO for "${domain.trim()}" isn't connected yet.\n\nWant to add it? Set it up in the repo:\n${repoUrl}\n\nClick OK to open the repo.`);
                if (confirmed) window.open(repoUrl, '_blank');
            }
        });

        function showError(message) {
            errorBox.textContent = message;
            errorBox.style.display = 'block';
            errorBox.style.backgroundColor = '#fef2f2';
            errorBox.style.borderColor = '#fca5a5';
            errorBox.style.color = '#b91c1c';
        }

        function showSuccess(message) {
            errorBox.textContent = message;
            errorBox.style.display = 'block';
            errorBox.style.backgroundColor = '#f0fdf4';
            errorBox.style.borderColor = '#86efac';
            errorBox.style.color = '#15803d';
        }
    </script>
</body>
</html>
